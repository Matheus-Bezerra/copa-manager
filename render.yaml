# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → connect repo
# Secrets (DATABASE_URL, JWT_SECRET, RESEND_API_KEY, APP_URL) must be set in the Render Dashboard.

services:
  - type: web
    name: copa-manager-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3333'
      - key: ENABLE_SWAGGER
        value: 'false'
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: '7'
      - key: PASSWORD_RESET_EXPIRES_MINUTES
        value: '15'
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: APP_URL
        sync: false
