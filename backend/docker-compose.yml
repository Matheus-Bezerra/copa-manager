services:
  db:
    image: postgres:16-alpine
    container_name: copa-manager-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: copa_manager
      POSTGRES_PASSWORD: copa_manager
      POSTGRES_DB: copa_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U copa_manager -d copa_manager']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copa-manager-api
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://copa_manager:copa_manager@db:5432/copa_manager?schema=public
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  postgres_data:
